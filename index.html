<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丙午年二月線上月會</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .bg-red-lny { background-color: #720917; }
        .lny-background {
            background: radial-gradient(circle at 50% 40%, #8b1a23 0%, #720917 100%);
            position: relative;
        }
        .lattice-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0 L80 40 L40 80 L0 40 Z' fill='none' stroke='%23d4af37' stroke-width='1'/%3E%3Ccircle cx='40' cy='40' r='2' fill='%23d4af37'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="lny-background min-h-screen text-[#fef3c7] overflow-x-hidden">
    <div class="lattice-pattern"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>,
                Save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>,
                Refresh: <g><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></g>,
                ChevronDown: <polyline points="6 9 12 15 18 9"/>,
                ChevronUp: <polyline points="18 15 12 9 6 15"/>,
                Users: <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g>,
                ClipboardCheck: <g><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="m9 14 2 2 4-4"/></g>,
                HelpCircle: <g><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></g>,
                Gift: <g><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [currentIndex, setCurrentIndex] = useState(null);
            const [isSpinning, setIsSpinning] = useState(false);
            const [showNames, setShowNames] = useState(false);
            const [openedEnvelopes, setOpenedEnvelopes] = useState(new Array(5).fill(false));
            const [editMode, setEditMode] = useState({ rules: false, names: false, questions: false, hongbao: false });

            const [hongbaoContent, setHongbaoContent] = useState([
                "可愛三連拍",
                "浚愷簽名小卡",
                "30 秒真心稱讚兌換券",
                "士華簽名小卡",
                "30 秒真心稱讚兌換券"
            ]);

            const [rules, setRules] = useState([
                "一、請大家先準備紙和筆，畫出一個 5x5 的格子，並填上數字 1~25。",
                "二、待主持人分配每人專屬代號後，賓果遊戲即開始！",
                "三、被指定到的答題者將從螢幕上十個題目中抽選一題並回答，回答完成後所有人即可圈選該答題者專屬之代號格子，並且答題者可任意指定下一位答題者進行回答。",
                "四、最先完成 n 條連線的前三人，將獲得主持人精心準備的特別紅包！"
            ]);
            const [rawNames, setRawNames] = useState("六屆馨儀 五屆順勳 六屆詠琦 四屆予彤 五屆孟涵 六屆于溱 五屆郁婕 六屆庭禎 六屆東憲 六屆靖評 六屆依琳 五屆淑萍 四屆庭儀 五屆玟荇 六屆熙媛 六屆欣樺 五屆宇媃 四屆子貽 六屆冠婷 五屆玟涵 六屆惠平 五屆炤輝 六屆瑀霈 四屆羚禎");
            const [doneIds, setDoneIds] = useState(new Set());
            const [questions, setQuestions] = useState([
                "你的電腦或手機現在用什麼背景圖？為什麼選擇這張圖",
                "你最喜歡的一部電影／劇？",
                "你曾經收過最棒的禮物是什麼？",
                "你最喜歡的一句話或是一句電影台詞/歌詞",
                "你目前為止的人生中，最棒的一天是哪一天？",
                "有哪些事情你一直想做但還沒有做？為什麼不做？",
                "近期好物分享",
                "幫大家科普一個你本科系的專業知識",
                "今年想要完成的旅行",
                "我經常被人誤會的事"
            ]);

            const processedParticipants = useMemo(() => {
                const list = rawNames.split(/\s+/).filter(name => name.trim() !== "");
                return list.map((name, index) => ({ id: index + 1, name }));
            }, [rawNames]);

            const handleSpin = () => {
                if (isSpinning) return;
                setIsSpinning(true);
                let count = 0;
                const totalSteps = 12;
                const interval = setInterval(() => {
                    setCurrentIndex(Math.floor(Math.random() * questions.length));
                    count++;
                    if (count >= totalSteps) {
                        clearInterval(interval);
                        setIsSpinning(false);
                    }
                }, 80);
            };

            const toggleDone = (id) => {
                const next = new Set(doneIds);
                if (next.has(id)) next.delete(id);
                else next.add(id);
                setDoneIds(next);
            };

            const actionButtonClass = `flex items-center gap-2 px-5 py-1.5 rounded-lg font-bold text-sm transition-all shadow-md ${isSpinning ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-[#d4af37] text-[#720917] hover:brightness-110 active:scale-95 border-b-2 border-[#b8860b]'}`;

            return (
                <div className="min-h-screen p-6 md:p-8 flex flex-col items-center relative z-10">
                    <header className="text-center mb-10 relative z-10 w-full">
                        <div className="flex justify-center items-center gap-4 mb-3">
                            <div className="h-[1px] w-12 bg-gradient-to-r from-transparent to-[#d4af37]/60"></div>
                            <span className="text-[#d4af37] tracking-[0.6em] font-medium text-xs sm:text-base uppercase opacity-90">丙午年正月初七</span>
                            <div className="h-[1px] w-12 bg-gradient-to-l from-transparent to-[#d4af37]/60"></div>
                        </div>
                        <h1 className="text-3xl md:text-5xl font-bold tracking-[0.2em] drop-shadow-[0_4px_10px_rgba(0,0,0,0.5)]">二月線上月會</h1>
                    </header>

                    <div className="w-full max-w-[1300px] space-y-8 relative z-10">
                        <section className="bg-[#8b1a23]/60 backdrop-blur-md p-8 rounded-[2rem] border border-[#d4af37]/20 relative shadow-2xl">
                            <button onClick={() => setEditMode({...editMode, rules: !editMode.rules})} className="absolute top-6 right-8 text-[#d4af37]/30 hover:text-[#d4af37] transition-all">
                                {editMode.rules ? <Icon name="Save" /> : <Icon name="Edit" />}
                            </button>
                            <h2 className="text-xl font-bold mb-6 text-[#d4af37] flex items-center gap-3"><Icon name="ClipboardCheck" size={22} /> 活動規則</h2>
                            {editMode.rules ? (
                                <textarea className="w-full bg-[#720917]/90 border border-[#d4af37]/30 rounded-2xl p-6 text-lg text-white h-56 outline-none focus:ring-1 ring-[#d4af37]" value={rules.join('\n')} onChange={(e) => setRules(e.target.value.split('\n'))} />
                            ) : (
                                <div className="text-lg md:text-xl space-y-4 leading-relaxed font-medium">{rules.map((r, i) => <p key={i}>{r}</p>)}</div>
                            )}
                        </section>

                        <section className="bg-[#8b1a23]/40 backdrop-blur-md p-6 rounded-[2rem] border border-[#d4af37]/15 relative shadow-xl overflow-hidden">
                            <div className="flex justify-between items-center px-4">
                                <div className="flex items-center gap-4">
                                    <h2 className="text-xl font-bold text-[#d4af37] tracking-widest uppercase flex items-center gap-3"><Icon name="Users" size={22} /> 參與者名單</h2>
                                    <button onClick={() => setShowNames(!showNames)} className={actionButtonClass}>
                                        <Icon name={showNames ? "ChevronUp" : "ChevronDown"} size={14} />
                                        {showNames ? '隱藏名單' : '顯示名單'}
                                    </button>
                                </div>
                                <button onClick={() => setEditMode({...editMode, names: !editMode.names})} className="text-[#d4af37]/40 hover:text-[#d4af37]">
                                    {editMode.names ? <Icon name="Save" /> : <Icon name="Edit" />}
                                </button>
                            </div>
                            {showNames && (
                                <div className="mt-4 pt-6 border-t border-[#d4af37]/10 transition-all duration-300">
                                    {editMode.names ? (
                                        <textarea className="w-full bg-[#720917]/90 border border-[#d4af37]/30 rounded-xl p-6 text-base text-white h-48 outline-none" value={rawNames} onChange={(e) => setRawNames(e.target.value)} />
                                    ) : (
                                        <div className="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
                                            {processedParticipants.map((p) => (
                                                <button key={p.id} onClick={() => toggleDone(p.id)} className={`flex items-center gap-2 px-3 py-2.5 rounded-xl border transition-all duration-300 ${doneIds.has(p.id) ? 'bg-[#2a050a] border-transparent opacity-40 shadow-inner' : 'bg-[#8b1a23]/80 border-[#d4af37]/10 hover:border-[#d4af37]/40 hover:bg-[#a1232d] shadow-md'}`}>
                                                    <span className={`text-xs font-bold w-5 shrink-0 ${doneIds.has(p.id) ? 'text-[#d4af37]/20' : 'text-[#d4af37]/60'}`}>{String(p.id).padStart(2, '0')}</span>
                                                    <span className={`text-sm font-bold truncate ${doneIds.has(p.id) ? 'text-[#fef3c7]/30' : 'text-[#fef3c7]'}`}>{p.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </section>

                        <section className="bg-[#8b1a23]/40 backdrop-blur-md p-8 rounded-[2rem] border border-[#d4af37]/15 relative shadow-2xl">
                            <div className="flex justify-between items-center mb-8 px-2">
                                <div className="flex items-center gap-4">
                                    <h2 className="text-xl font-bold text-[#d4af37] tracking-widest uppercase flex items-center gap-3"><Icon name="HelpCircle" size={22} /> 題目牆</h2>
                                    <button onClick={handleSpin} disabled={isSpinning} className={actionButtonClass}>
                                        <Icon name="Refresh" size={14} className={isSpinning ? 'animate-spin' : ''} />
                                        抽題
                                    </button>
                                </div>
                                <button onClick={() => setEditMode({...editMode, questions: !editMode.questions})} className="text-[#d4af37]/40 hover:text-[#d4af37]">
                                    {editMode.questions ? <Icon name="Save" /> : <Icon name="Edit" />}
                                </button>
                            </div>
                            {editMode.questions ? (
                                <textarea className="w-full bg-[#720917]/90 border border-[#d4af37]/30 rounded-2xl p-6 text-lg text-white h-80 outline-none" value={questions.join('\n')} onChange={(e) => setQuestions(e.target.value.split('\n'))} />
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {questions.map((q, index) => (
                                        <div key={index} className={`p-4 rounded-2xl border transition-all duration-500 flex items-center min-h-[72px] ${currentIndex === index ? 'bg-[#d4af37] border-white scale-[1.03] shadow-[0_0_40px_rgba(212,175,55,0.4)] z-10 text-[#720917]' : 'bg-[#8b1a23]/30 border-[#d4af37]/10 hover:border-[#d4af37]/30'}`}>
                                            <div className="flex items-center gap-4 w-full">
                                                <span className={`text-2xl font-bold w-10 shrink-0 tracking-tighter ${currentIndex === index ? 'text-[#720917]' : 'text-[#d4af37]/30'}`}>{String(index + 1).padStart(2, '0')}</span>
                                                <p className="text-lg leading-tight font-bold">{q}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>

                        <section className="bg-[#8b1a23]/30 backdrop-blur-md p-8 rounded-[2rem] border border-[#d4af37]/15 relative shadow-xl mb-20 text-center">
                            <button onClick={() => setEditMode({...editMode, hongbao: !editMode.hongbao})} className="absolute top-6 right-8 text-[#d4af37]/30 hover:text-[#d4af37] transition-all">
                                {editMode.hongbao ? <Icon name="Save" /> : <Icon name="Edit" />}
                            </button>
                            <h2 className="text-xl font-bold mb-8 text-[#d4af37] tracking-widest uppercase flex items-center justify-center gap-3"><Icon name="Gift" size={22} /> 特別紅包</h2>
                            
                            {editMode.hongbao ? (
                                <textarea 
                                    className="w-full bg-[#720917]/90 border border-[#d4af37]/30 rounded-2xl p-6 text-lg text-white h-48 outline-none focus:ring-1 ring-[#d4af37]" 
                                    value={hongbaoContent.join('\n')} 
                                    onChange={(e) => setHongbaoContent(e.target.value.split('\n'))}
                                    placeholder="每行輸入一個紅包內容"
                                />
                            ) : (
                                <div className="flex flex-wrap justify-center gap-6">
                                    {hongbaoContent.slice(0, 5).map((content, idx) => (
                                        <button 
                                            key={idx} 
                                            onClick={() => { const next = [...openedEnvelopes]; next[idx] = !next[idx]; setOpenedEnvelopes(next); }} 
                                            className={`w-40 h-52 rounded-xl transition-all duration-500 relative flex flex-col items-center justify-center border-2 shadow-lg hover:-translate-y-1 ${openedEnvelopes[idx] ? 'bg-[#d4af37] border-white scale-105' : 'bg-[#b91c1c] border-[#d4af37]/50 hover:border-[#d4af37]'}`}
                                        >
                                            {openedEnvelopes[idx] ? (
                                                <div className="p-4 text-[#720917] font-bold text-center leading-relaxed animate-in fade-in duration-500">
                                                    <p className="text-xs mb-2 opacity-60">恭喜獲得</p>
                                                    <div className="h-[1px] w-8 bg-[#720917]/20 mx-auto mb-3"></div>
                                                    <p className="text-lg tracking-tight">{content}</p>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="w-12 h-12 bg-[#d4af37] rounded-full flex items-center justify-center mb-4 shadow-inner">
                                                        <span className="text-[#720917] text-2xl font-serif">福</span>
                                                    </div>
                                                    <p className="text-[#d4af37] text-sm tracking-widest font-bold">開啟驚喜</p>
                                                </>
                                            )}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </section>
                    </div>

                    <footer className="mt-auto py-8 text-[#fef3c7]/20 text-[10px] tracking-[0.5em] uppercase text-center w-full">© 2026 CNY LUNAR NEW YEAR SESSION • 歲次丙午</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
